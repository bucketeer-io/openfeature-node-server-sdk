name: release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release_please:
    permissions:
      contents: write
      pull-requests: write
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@c2a5a2bd6a758a0937f1ddb1e8950609867ed15c # v4.3.0
        with:
          token: ${{ secrets.WORKFLOW_TOKEN }} # PAT so the tag push by release-please triggers publish.yml
